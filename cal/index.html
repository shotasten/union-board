<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="googlebot" content="noindex, nofollow" />
  <meta name="referrer" content="no-referrer" />
  <title>TMU Event</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: #f7f7f7;
      color: #111;
      display: flex;
      justify-content: center;
      padding: 16px;
      box-sizing: border-box;
      min-height: 100vh;
    }

    .frame-wrap {
      width: 100%;
      max-width: 1000px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .frame-header {
      padding: 8px 12px;
      font-size: 15px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .frame-header .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #009688;
    }

    .info-box {
      padding: 8px 12px;
      background: #fafafa;
      border-bottom: 1px solid #eee;
      font-size: 14px;
      line-height: 1.4;
    }
    .info-box p {
      margin: 4px 0;
    }
    .info-box a {
      color: #0077cc;
      text-decoration: underline;
      font-size: 14px;
    }

    iframe {
      width: 100%;
      height: 600px;
      border: 0;
      display: block;
    }

    @media (max-width: 640px){
      iframe { height: 480px; }
    }
  </style>
</head>
<body>
  <div class="frame-wrap" role="region" aria-label="TMU Event カレンダー">
    <div class="frame-header">
      <span class="dot"></span>
      <strong>TMU Event</strong>
    </div>

    <div class="info-box">
      <p>
        出欠登録はこちらから：<br>
        <a href="../">UnionBoard</a>
      </p>
    </div>

    <iframe
      src="%VITE_CAL_IFRAME_SRC%"
      loading="lazy"
      frameborder="0"
      scrolling="no"
      title="TMU Event Calendar"
    ></iframe>

  </div>
</body>
</html>
