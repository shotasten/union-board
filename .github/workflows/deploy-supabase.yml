name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'デプロイ先環境'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prd
          - prd-supabase

jobs:
  # main push または dispatch dev: dev Supabase へデプロイ
  deploy-dev:
    name: Deploy Supabase (dev)
    runs-on: ubuntu-latest
    if: github.actor == 'shotasten' && (github.event_name == 'push' || inputs.environment == 'dev')
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ vars.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run database migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Set GOOGLE_SERVICE_ACCOUNT_JSON secret
        run: supabase secrets set GOOGLE_SERVICE_ACCOUNT_JSON='${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set GOOGLE_CALENDAR_ID
        run: supabase secrets set GOOGLE_CALENDAR_ID='${{ vars.GOOGLE_CALENDAR_ID }}'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify secrets are set
        run: supabase secrets list
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        run: supabase functions deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # dispatch prd: prd Cloudflare Pages へデプロイ
  deploy-prd:
    name: Deploy Cloudflare Pages (prd)
    runs-on: ubuntu-latest
    if: github.actor == 'shotasten' && github.event_name == 'workflow_dispatch' && inputs.environment == 'prd'
    environment: prd

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_SPACE_ID: ${{ vars.VITE_SPACE_ID }}
          VITE_FUNCTIONS_URL: ${{ vars.VITE_FUNCTIONS_URL }}
          VITE_CAL_IFRAME_SRC: ${{ vars.VITE_CAL_IFRAME_SRC }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=union-board-prd

  # dispatch prd-supabase: prd Supabase へデプロイ（マイグレーション・Edge Functions 更新時のみ）
  deploy-prd-supabase:
    name: Deploy Supabase (prd)
    runs-on: ubuntu-latest
    if: github.actor == 'shotasten' && github.event_name == 'workflow_dispatch' && inputs.environment == 'prd-supabase'
    environment: prd

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ vars.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run database migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Set GOOGLE_SERVICE_ACCOUNT_JSON secret
        run: supabase secrets set GOOGLE_SERVICE_ACCOUNT_JSON='${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set GOOGLE_CALENDAR_ID
        run: supabase secrets set GOOGLE_CALENDAR_ID='${{ vars.GOOGLE_CALENDAR_ID }}'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify secrets are set
        run: supabase secrets list
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        run: supabase functions deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
